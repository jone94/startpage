<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Start stránka</title>

<style>
    :root {
        color-scheme: dark;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .grid {
        width: 95vw;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
    }

    .tile {
        text-decoration: none;
        color: white;
        background: #1f2937;
        border-radius: 18px;
        padding: 18px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1/1;
        transition: transform 0.12s ease;
        -webkit-tap-highlight-color: transparent;
    }

    .tile:active {
        transform: scale(0.96);
    }

    .icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        margin-bottom: 10px;
        object-fit: cover;
        background: #374151;
    }

    .label {
        font-size: 14px;
        text-align: center;
        line-height: 1.2;
        word-break: break-word;
    }

    @media (max-width: 480px) {
        .grid {
            gap: 10px;
        }

        .label {
            font-size: 12px;
        }

        .icon {
            width: 46px;
            height: 46px;
        }
    }
</style>
</head>

<body>

<div class="grid">
