<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>Start stránka</title>

<style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        font-family: Arial, sans-serif;
        background: #111827;
        color: white;
    }

    body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 8px;
    }

    .grid {
        width: 100%;
        max-width: 520px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
    }

    .tile {
        min-width: 0;
        text-decoration: none;
        color: white;
        background: #1f2937;
        border-radius: 14px;
        padding: 10px 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        transition: transform 0.12s ease;
        -webkit-tap-highlight-color: transparent;
    }

    .tile:active { transform: scale(0.96); }

    .icon {
        width: clamp(30px, 9vw, 44px);
        height: clamp(30px, 9vw, 44px);
        border-radius: 11px;
        margin-bottom: 7px;
        object-fit: cover;
        background: #374151;
    }

    .label {
        width: 100%;
        padding: 0 2px;
        font-size: clamp(10px, 2.8vw, 13px);
        text-align: center;
        line-height: 1.15;
        overflow-wrap: anywhere;
    }
</style>
</head>
